<!-- @dsCard group="Components" name="Buttons, tags, flashes & forms" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · JobBot</title>
<style>
:root{
  --bg:#faf9f7; --card:#ffffff; --ink:#1e2430; --muted:#6b7280;
  --line:#ececeb; --brand:#6366f1; --brand-d:#4f46e5; --brand-soft:#eef0ff;
  --teal:#0d9488; --teal-soft:#ecfdf8; --good:#15803d; --good-bg:#f0fdf4;
  --bad:#b91c1c; --bad-bg:#fef2f2; --info:#1e40af; --info-bg:#eff6ff; --star:#f59e0b;
  --shadow:0 1px 2px rgba(16,24,40,.04), 0 10px 28px -14px rgba(16,24,40,.16);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);padding:30px;
  font:15px/1.55 -apple-system,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:22px}
.sect{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 14px}
.rowg{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--brand);color:#fff;border:0;
  padding:11px 16px;border-radius:11px;font-weight:600;font-size:14px;cursor:pointer;
  box-shadow:0 6px 16px -6px rgba(99,102,241,.5)}
.btn:hover{background:var(--brand-d)}
.btn.ghost{background:var(--brand-soft);color:var(--brand-d);box-shadow:none}
.btn.danger{background:var(--bad-bg);color:var(--bad);box-shadow:none}
.btn.small{padding:7px 12px;font-size:13px}
.star{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:18px;color:#cbcbcb;cursor:pointer}
.star.on{color:var(--star);border-color:#fde68a;background:#fffbeb}
.tag{display:inline-flex;align-items:center;gap:5px;background:#f4f4f5;color:#3f3f46;border-radius:999px;padding:3px 11px;font-size:12px;font-weight:600}
.tag.remote{background:var(--teal-soft);color:var(--teal)}
.tag.src{background:var(--brand-soft);color:var(--brand-d)}
.pill-new{background:var(--good-bg);color:var(--good);border-radius:999px;padding:2px 9px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.flash{padding:12px 15px;border-radius:12px;font-size:14px;font-weight:500;margin-bottom:9px;display:flex;gap:9px;align-items:center}
.flash.success{background:var(--good-bg);color:var(--good)}
.flash.error{background:var(--bad-bg);color:var(--bad)}
.flash.info{background:var(--info-bg);color:var(--info)}
label{display:block;font-weight:600;font-size:13px;margin:0 0 6px}
input,select{width:100%;padding:11px 13px;border:1px solid #e4e4e7;border-radius:11px;font:inherit;background:#fff}
input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.grid2{display:flex;gap:14px}.grid2>div{flex:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="sect">
    <h2>Buttons</h2>
    <div class="rowg">
      <button class="btn">Refresh my matches</button>
      <button class="btn ghost">Regenerate</button>
      <button class="btn danger">Delete resume</button>
      <button class="btn small">Small</button>
      <button class="star on">★</button>
      <button class="star">☆</button>
    </div>
  </div>

  <div class="sect">
    <h2>Tags &amp; badges</h2>
    <div class="rowg">
      <span class="pill-new">New</span>
      <span class="tag remote">🟢 Remote</span>
      <span class="tag">📍 New York, NY</span>
      <span class="tag">posted 2d ago</span>
      <span class="tag src">adzuna</span>
    </div>
  </div>

  <div class="sect">
    <h2>Flash messages</h2>
    <div class="flash success">✓ Your matches were refreshed — 35 new jobs found.</div>
    <div class="flash info">ℹ Upload a resume to start scoring matches.</div>
    <div class="flash error">✕ That email or password was incorrect.</div>
  </div>

  <div class="sect">
    <h2>Form fields</h2>
    <div class="grid2">
      <div><label>Keywords</label><input value="python, fastapi, backend"></div>
      <div><label>Work type</label><select><option>Remote</option><option>Hybrid</option><option>On-site</option></select></div>
    </div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sign in · JobBot</title>
<style>
:root{
  --bg:#faf9f7; --card:#ffffff; --ink:#1e2430; --muted:#6b7280;
  --line:#ececeb; --brand:#6366f1; --brand-d:#4f46e5; --teal:#0d9488;
  --shadow:0 1px 2px rgba(16,24,40,.04), 0 18px 50px -20px rgba(16,24,40,.28);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;
  background:radial-gradient(1200px 600px at 50% -10%, #eef0ff 0%, var(--bg) 55%);
  color:var(--ink);font:15px/1.55 -apple-system,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:34px 32px;width:380px;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:20px;justify-content:center;margin-bottom:6px}
.brand .dot{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;
  background:linear-gradient(135deg,var(--brand),var(--teal));box-shadow:0 6px 16px -4px rgba(99,102,241,.6)}
.brand b{color:var(--brand-d)}
.tag{text-align:center;color:var(--muted);font-size:13.5px;margin:0 0 22px}
label{display:block;font-weight:600;font-size:13px;margin:14px 0 6px}
input{width:100%;padding:11px 13px;border:1px solid #e4e4e7;border-radius:11px;font:inherit;background:#fff}
input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.btn{width:100%;margin-top:20px;background:var(--brand);color:#fff;border:0;padding:12px;border-radius:11px;
  font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 8px 18px -6px rgba(99,102,241,.55)}
.btn:hover{background:var(--brand-d)}
.foot{text-align:center;color:var(--muted);font-size:13px;margin-top:18px}
.foot a{color:var(--brand-d);font-weight:600;text-decoration:none}
</style>
</head>
<body>
  <form class="card">
    <div class="brand"><span class="dot">◆</span> Job<b>Bot</b></div>
    <p class="tag">Welcome back — sign in to see your matches.</p>
    <label>Email</label>
    <input type="email" value="you@example.com">
    <label>Password</label>
    <input type="password" value="••••••••••">
    <button class="btn" type="button">Sign in</button>
    <p class="foot">Invited? <a href="#">Create your account</a></p>
  </form>
</body>
</html>

# Alembic configuration — this drives the database "migrations".
# Migrations are versioned scripts (in migrations/versions/) that create and
# later evolve the database tables. The actual DB connection URL is NOT set
# here; it is read from .env by migrations/env.py so secrets stay in one place.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use a date-prefixed, readable filename for each new migration script.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
